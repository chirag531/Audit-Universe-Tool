services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tool123}
      POSTGRES_USER: ${POSTGRES_USER:-tool123_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tool123_pass}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tool123_user} -d ${POSTGRES_DB:-tool123}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-tool123}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-tool123_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-tool123_pass}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      APP_JWT_SECRET: ${APP_JWT_SECRET:-replace_with_long_random_secret_at_least_32_chars}
      APP_JWT_EXPIRATION_MS: ${APP_JWT_EXPIRATION_MS:-3600000}
      APP_AI_BASE_URL: ${APP_AI_BASE_URL:-http://ai-service:5000}
      APP_AI_API_KEY: ${APP_AI_API_KEY:-replace_with_random_api_key}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-service:
        condition: service_started

  ai-service:
    build: ./ai-service
    environment:
      AI_SERVICE_API_KEY: ${APP_AI_API_KEY:-replace_with_random_api_key}
      AI_SERVICE_RATE_LIMIT_PER_MIN: ${AI_SERVICE_RATE_LIMIT_PER_MIN:-30}
      REDIS_URL: redis://redis:6379/1
    ports:
      - "${AI_SERVICE_PORT:-5000}:5000"
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8080/api
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_started
